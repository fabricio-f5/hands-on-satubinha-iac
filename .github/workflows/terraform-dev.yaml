name: Terraform Dev

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Executar terraform apply?'
        required: false
        default: 'true'
      plan_destroy:
        description: 'Executar terraform plan para destroy?'
        required: false
        default: 'false'
      destroy:
        description: 'Executar terraform destroy?'
        required: false
        default: 'false'

jobs:
  terraform-dev:
    runs-on: ubuntu-latest
    permissions:          
      id-token: write     
      contents: read      

    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}


      - name: Show Terraform version  
        run: terraform version

      - name: Terraform fmt check
        run: terraform fmt -check 

      - name: Initialize Terraform
        run: terraform init

      - name: Validate Terraform configuration
        run: terraform validate

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true
          output_format: cli
          output_file_path: checkov-report.txt
          download_external_modules: false
      
      - name: Upload checkov report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report-${{ github.run_id }}
          path: checkov-report.txt
          retention-days: 30

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=dev.tfvars -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" -out=tfplan

      - name: Conditional Terraform Apply
        if: ${{ github.event.inputs.apply == 'true' }}
        run: |
          echo "Executando terraform apply..."
          terraform show -json tfplan | jq '.resource_changes | length' > changes.txt
          CHANGES=$(cat changes.txt)
          if [ "$CHANGES" -gt 0 ]; then
            terraform apply -auto-approve tfplan
          else
            echo "Sem mudanças no plan. Apply não necessário."
          fi

      - name: Conditional Terraform Plan Destroy
        if: ${{ github.event.inputs.plan_destroy == 'true' }}
        run: |
          echo "Executando terraform plan para destroy..."
          terraform plan -destroy -var-file=dev.tfvars -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" -out=tfplan_destroy


      - name: Conditional Terraform Destroy
        if: ${{ github.event.inputs.destroy == 'true' }}
        run: |
          echo "Executando terraform destroy..."
          terraform destroy -auto-approve -var-file=dev.tfvars -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Show terraform output
        run: terraform output 