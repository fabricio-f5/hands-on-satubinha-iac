name: Satubinha Day 1

on:
  push:
    branches:
      -  main 
  workflow_dispatch:
  
jobs:
  explore-project:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show root files
        run: ls -la

      - name: show environment files
        run: ls -la environments/dev

      - name: Confirm current directory
        run:
          pwd
          ls -la

      - name: Print success message
        run: echo "Directory structure is correct. Ready to proceed with the pipeline!"
