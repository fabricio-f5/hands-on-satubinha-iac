name: Terraform Prod Apply Workflow

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Executar terraform apply?'
        required: false
        default: 'false'
      plan_destroy:
        description: 'Executar terraform plan para destroy?'
        required: false
        default: 'false'
      destroy:
        description: 'Executar terraform destroy?'
        required: false
        default: 'false'

jobs:
  terraform-prod:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: prod # GitHub Environment, requer aprovação se configurado
    concurrency:
      group: prod
      cancel-in-progress: true

    defaults:
      run:
        working-directory: environments/prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Write SSH public key to file
        run: echo "${{ secrets.SSH_PUBLIC_KEY }}" > id_ed25519.pub

      - name: Show Terraform version  
        run: terraform version

      - name: Initialize Terraform
        run: terraform init

      - name: Validate Terraform configuration
        run: terraform validate

      - name: Write private tfvars file
        run: echo "${{ secrets.PROD_PRIVATE_TFVARS }}" > prod-private.tfvars
      
      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=prod-private.tfvars -var-file=prod-public.tfvars -out=tfplan

      - name: Conditional Terraform Apply
        if: ${{ github.event.inputs.apply == 'true' }}
        run: |
          echo "Executando terraform apply..."
          terraform show -json tfplan | jq '.resource_changes | length' > changes.txt
          CHANGES=$(cat changes.txt)
          if [ "$CHANGES" -gt 0 ]; then
            terraform apply -auto-approve tfplan
          else
            echo "Sem mudanças no plan. Apply não necessário."
          fi

      - name: Conditional Terraform Plan Destroy
        if: ${{ github.event.inputs.plan_destroy == 'true' }}
        run: |
          echo "Executando terraform plan para destroy..."
          terraform plan -destroy -var-file=prod-private.tfvars -var-file=prod-public.tfvars -out=tfplan_destroy
          terraform show -no-color tfplan_destroy

      - name: Conditional Terraform Destroy
        if: ${{ github.event.inputs.destroy == 'true' }}
        run: |
          echo "Executando terraform destroy..."
          terraform destroy -auto-approve -var-file=prod-private.tfvars -var-file=prod-public.tfvars

      - name: Show terraform output
        run: terraform output -json
